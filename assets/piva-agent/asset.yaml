apiVersion: asset.sap/v1
kind: Asset

metadata:
  name: piva-agent
  version: 1.0.0
  description: Physical Inventory Verification Agent — EWM physical inventory cycle orchestration via natural language

type: agent

runtime:
  type: python
  version: "3.11"

container:
  buildPath: .
  port: 5000

requires:
  - name: OP_PRODUCT_0002_ProductEWMWarehouse
    kind: mcp-server
    ordId: sap.s4:apiResource:OP_PRODUCT_0002:v1
  - name: OP_WHSEPHYSICALINVENTORYDOC_0001
    kind: mcp-server
    ordId: sap.s4:apiResource:OP_WHSEPHYSICALINVENTORYDOC_0001:v1

probes:
  startup:
    path: /.well-known/agent.json
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 18
  liveness:
    path: /.well-known/agent.json
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /.well-known/agent.json
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
