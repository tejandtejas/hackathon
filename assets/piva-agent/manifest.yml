---
# CF manifest for PIVA agent.
# Default route assigned automatically as <app-name>.<default-shared-domain>.
# Override routes: only if a custom hostname is needed.
applications:
  - name: piva-agent-tj
    memory: 512M
    disk_quota: 1G
    instances: 1
    buildpacks:
      - python_buildpack
    command: gunicorn --worker-class uvicorn.workers.UvicornWorker --workers 2 --bind 0.0.0.0:${PORT} --chdir app main:application
    timeout: 180
    health-check-type: http
    health-check-http-endpoint: /.well-known/agent.json
    services:
      - proj-vector-destination-service
      - proj-vector-connectivity-service
    env:
      S4HANA_QVL_DESTINATION_NAME: S4Hana_QVL
      DESTINATION_NAME: S4Hana_QVL
      AICORE_DESTINATION_NAME: aicore
      LOG_LEVEL: INFO
